<h3>Lista de indumentaria</h3>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Talle</th>
            <th>Valor</th>
            <th>Compra</th>
        </tr>
    </thead>
    <tbody>
        @for (indum of indumentaria; track indum.nombre) {
        <tr [ngClass]= "{'oferta' : indum.oferta}">
            <td><img [src]="indum.imagen" alt="{{indum.nombre}}" width="100"></td>
            <td>{{indum.nombre}}</td>
            <td>{{indum.talle}}</td>
            <td>{{indum.valor | currency:'ARS':'symbol':'1.2-2'}}</td>
            <td> @if (indum.stock > 0) {
                    <app-input-numeros [indum]="indum"></app-input-numeros>
                } @else {
                    <button class="btn btn-agotado" disabled> Agotado </button>
                }
            </td>
        </tr>
        } @empty {
            <tr>
                <td colspan="5">No hay indumentaria disponible.</td>
            </tr>
        }
    </tbody>
</table>
