<div class="container my-5">

    <div class="text-center mb-5 p-4 rounded-3 encabezado-socios">

        <h1 class="display-6 fw-bold text-uppercase">
            Más obras, más alegrías
        </h1>

        <p class="lead mb-0">
            Sumate al Club Deportivo Garmense
        </p>

    </div>

    <div class="card shadow border-0 formulario-card">

        <div class="card-header">

            Quiero asociarme

        </div>

        <div class="card-body">

            <form
            [formGroup]="socioForm"
            (ngSubmit)="guardarSocio()">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Nombre</label>

                        <input
                        type="text"
                        class="form-control"
                        formControlName="nombre">

                        @if(socioForm.get('nombre')?.invalid &&
                            socioForm.get('nombre')?.touched){

                            <small class="text-danger">
                                Ingrese un nombre válido.
                            </small>

                        }

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Apellido</label>

                        <input
                        type="text"
                        class="form-control"
                        formControlName="apellido">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Email</label>

                        <input
                        type="email"
                        class="form-control"
                        formControlName="email">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Teléfono</label>

                        <input
                        type="text"
                        class="form-control"
                        formControlName="telefono">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>DNI</label>

                        <input
                        type="text"
                        class="form-control"
                        formControlName="dni">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Ciudad</label>

                        <input
                        type="text"
                        class="form-control"
                        formControlName="ciudad">

                    </div>

                    <div class="col-md-6 mb-4">

                        <label>Fecha de nacimiento</label>

                        <input
                        type="date"
                        class="form-control"
                        formControlName="nacimiento">

                    </div>

                </div>

                <button
                class="btn btn-socio w-100"
                type="submit"
                [disabled]="socioForm.invalid">

                    ¡Quiero ser socio!

                </button>

            </form>

        </div>

    </div>

</div>
