<h2>Más obras, más alegrías</h2>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="text-center mb-4">Asociate al Club</h2>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" placeholder="Ingrese su nombre">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Apellido</label>
                            <input type="text" class="form-control" placeholder="Ingrese su apellido">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" placeholder="ejemplo@mail.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" class="form-control" placeholder="249 XXXXXXX">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">DNI</label>
                            <input type="text" class="form-control" placeholder="Ingrese su DNI">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ciudad</label>
                            <input type="text" class="form-control" placeholder="Ciudad">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Fecha de nacimiento</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-socio">
                                ¡Quiero ser socio!
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
